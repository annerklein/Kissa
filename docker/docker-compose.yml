version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - kissa-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/kissa.db
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Memory limit for Raspberry Pi (adjust based on your RPi model)
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # NEXT_PUBLIC_API_URL is auto-detected from browser hostname
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  kissa-data:
    driver: local
